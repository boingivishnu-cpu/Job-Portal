{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="mb-4">{{ 'Edit Job' if job else 'Post a Job' }}</h2>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Job Title</label>
                            <input type="text" name="title" class="form-control" value="{{ job.title if job else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Company</label>
                            <input type="text" name="company" class="form-control" value="{{ job.company if job else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" value="{{ job.location if job else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <input type="text" name="category" class="form-control" value="{{ job.category if job else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Salary</label>
                            <input type="text" name="salary" class="form-control" value="{{ job.salary if job else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Application Link</label>
                            <input type="url" name="application_link" class="form-control" value="{{ job.application_link if job else '' }}" placeholder="https://linkedin.com/jobs/view/.. or https://indeed.com/..">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Application Email</label>
                            <input type="email" name="application_email" class="form-control" value="{{ job.application_email if job else '' }}" placeholder="hiring@company.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="6" required>{{ job.description if job else '' }}</textarea>
                        </div>
                    </div>
                    <button class="btn btn-primary mt-4">{{ 'Update Job' if job else 'Post Job' }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
